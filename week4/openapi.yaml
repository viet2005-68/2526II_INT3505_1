swagger: "2.0"
info: 
  title: Book API
  version: 1.0.0
  description: API for managing books

servers:
  - url: http://localhost:4004
    description: Local development server

paths:
  /books:
    get:
      summary: Get all books
      operationId: server.get_books
      responses:
        '200':
          description: A list of booksserver
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    
components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "The Great Gatsby"
        author:
          type: string
          example: "F. Scott Fitzgerald"
        year:
          type: integer
          example: 2020
        