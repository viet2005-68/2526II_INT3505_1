openapi: 3.0.0
info: 
  title: Book API
  version: 1.0.0
  description: API for managing books

servers:
  - url: http://localhost:4004
    description: Local development server

paths:
  /books:
    get:
      summary: Get all books
      operationId: server.get_books
      responses:
        '200':
          description: A list of booksserver
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    post:
      summary: Create a new book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBook"
      responses:
        '201':
          description: Book created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /books/{book_id}:
    get:
      summary: Get a book
      operationId: server.get_book
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: A book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update a book
      operationId: server.update_book
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBook"
      responses:
        '200':
          description: Book updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete a book
      operationId: server.delete_book
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Book deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "The Great Gatsby"
        author:
          type: string
          example: "F. Scott Fitzgerald"
        year:
          type: integer
          example: 2020
    CreateBook:
      type: object
      properties:
        title:
          type: string
          example: "The Great Gatsby"
        author:
          type: string
          example: "F. Scott Fitzgerald"
        year:
          type: integer
          example: 2020
      required:
        - title
        - author
        - year
    UpdateBook:
      type: object
      properties:
        title:
          type: string
          example: "The Great Gatsby"
        author:
          type: string
          example: "F. Scott Fitzgerald"
        year:
          type: integer
          example: 2020
      required:
        - title
        - author
        - year
    Error:
      type: object
      properties:
        error:
          type: string
          example: "Internal server error"
        message:
          type: string
          example: "An error occurred while creating the book"
      required:
        - error
        - message