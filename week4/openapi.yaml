openapi: 3.0.0
info: 
  title: Book API
  version: 1.0.0
  description: API for managing books

servers:
  - url: http://localhost:4004
    description: Local development server

paths:
  /books:
    get:
      summary: Get all books
      operationId: server.get_books
      parameters:
        # Gọi tham số phân trang dùng chung
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        '200':
          description: A list of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    post:
      summary: Create a new book
      # Dùng $ref gọi thẳng Body Payload đã định nghĩa ở dưới, cực kỳ ngắn gọn!
      requestBody:
        $ref: "#/components/requestBodies/CreateBookPayload"
      responses:
        '201':
          description: Book created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        '400':
          $ref: "#/components/responses/BadRequestError" # Đã sửa đường dẫn
        '500':
          $ref: "#/components/responses/InternalServerError" # Đã sửa đường dẫn

  /books/{book_id}:
    parameters:
      - $ref: "#/components/parameters/book_id" # Đã sửa đường dẫn
    
    get:
      summary: Get a book
      operationId: server.get_book
      responses:
        '200':
          description: A book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        '404':
          $ref: "#/components/responses/NotFoundError"
        '500':
          $ref: "#/components/responses/InternalServerError"
    
    put:
      summary: Update a book
      operationId: server.update_book
      requestBody:
        $ref: "#/components/requestBodies/UpdateBookPayload" # Dùng $ref cho gọn
      responses:
        '200':
          description: Book updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        '404':
          $ref: "#/components/responses/NotFoundError"
        '500':
          $ref: "#/components/responses/InternalServerError"
    
    delete:
      summary: Delete a book
      operationId: server.delete_book
      responses:
        '200':
          description: Book deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        '404':
          $ref: "#/components/responses/NotFoundError"
        '500':
          $ref: "#/components/responses/InternalServerError"

components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: integer
          example: 1
          readOnly: true
        title:
          type: string
          example: "Doraemon"
        author:
          type: string
          example: "Fujiko Fujio"
        year:
          type: integer
          example: 1969
    
    # Đã bổ sung lại CreateBook bị thiếu
    CreateBook:
      type: object
      properties:
        title:
          type: string
          example: "The Great Gatsby"
        author:
          type: string
          example: "F. Scott Fitzgerald"
        year:
          type: integer
          example: 2020
      required:
        - title
        - author
        - year
        
    UpdateBook:
      type: object
      properties:
        title:
          type: string
          example: "The Great Gatsby"
        author:
          type: string
          example: "F. Scott Fitzgerald"
        year:
          type: integer
          example: 2020
      required:
        - title
        - author
        - year
        
    Error:
      type: object
      properties:
        errorCode:
          type: integer
          example: 400
        message:
          type: string
          example: "Error message details"

  responses:
    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFoundError:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  requestBodies:
    CreateBookPayload:
      description: Payload để tạo sách mới
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateBook"
    UpdateBookPayload:
      description: Payload để cập nhật sách
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateBook"

  parameters:
    book_id:
      name: book_id
      in: path
      required: true
      description: ID của sách
      schema:
        type: integer
        example: 1
    
    # Tách pagination thành 2 biến riêng biệt chuẩn REST API
    limitParam:
      name: limit
      in: query
      required: false
      description: Số lượng sách tối đa trả về
      schema:
        type: integer
        example: 10
        
    offsetParam:
      name: offset
      in: query
      required: false
      description: Bỏ qua bao nhiêu sách đầu tiên (dùng để chuyển trang)
      schema:
        type: integer
        example: 0