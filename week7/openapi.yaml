openapi: 3.0.3
info:
  title: Library Management API
  version: 1.0.0
  description: API for managing library

servers:
  - url: /
    description: Current host (Swagger Try it out)
  - url: http://127.0.0.1:8080
    description: Local IPv4
  - url: http://localhost:8080
    description: Local hostname

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Books
    description: Book endpoints

paths:
  /api/auth/register:
    post:
      tags:
        - Auth
      security: []
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPayload"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
  /api/auth/login:
    post:
      tags:
        - Auth
      security: []
      summary: Login and get Bearer token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginPayload"
      responses:
        "200":
          description: Login successful, return token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/books:
    get:
      tags:
        - Books
      summary: Get all books with pagination and search
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Search"
      responses:
        "200":
          description: List of books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBooksResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - Books
      summary: Create a new book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookPayload"
      responses:
        "201":
          description: Book created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/books/{book_id}:
    get:
      tags:
        - Books
      summary: Get a book by ID
      parameters:
        - $ref: "#/components/parameters/BookId"
      responses:
        "200":
          description: Book found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags:
        - Books
      summary: Update a book
      parameters:
        - $ref: "#/components/parameters/BookId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookPayload"
      responses:
        "200":
          description: Book updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags:
        - Books
      summary: Delete a book
      parameters:
        - $ref: "#/components/parameters/BookId"
      responses:
        "200":
          description: Book deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  parameters:
    BookId:
      name: book_id
      in: path
      description: ID of the book
      required: true
      schema:
        type: integer
        minimum: 1
    Page:
      name: page
      in: query
      description: Page number
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
    Limit:
      name: limit
      in: query
      description: Number of books per page
      required: false
      schema:
        type: integer
        default: 10
        minimum: 1
    Search:
      name: search
      in: query
      description: Search by title or author
      required: false
      schema:
        type: string
        default: ""

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: "Error message"
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: "User registered successfully"
      required:
        - message

    RegisterPayload:
      type: object
      properties:
        username:
          type: string
          example: "alice"
        password:
          type: string
          example: "Str0ngPass"
      required:
        - username
        - password

    LoginPayload:
      type: object
      properties:
        username:
          type: string
          example: "alice"
        password:
          type: string
          example: "Str0ngPass"
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
        token_type:
          type: string
          example: "Bearer"
      required:
        - access_token
        - token_type

    BookFields:
      type: object
      properties:
        title:
          type: string
          example: "The Great Gatsby"
        author:
          type: string
          example: "F. Scott Fitzgerald"
        year:
          type: integer
          example: 1925

    Book:
      allOf:
        - type: object
          properties:
            id:
              type: integer
              example: 1
          required:
            - id
        - $ref: "#/components/schemas/BookFields"
        - type: object
          required:
            - title
            - author
            - year

    CreateBookPayload:
      allOf:
        - $ref: "#/components/schemas/BookFields"
        - type: object
          required:
            - title
            - author
            - year

    UpdateBookPayload:
      description: All fields optional; include at least one field to update.
      allOf:
        - $ref: "#/components/schemas/BookFields"
        - type: object
          minProperties: 1

    PaginationMetadata:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 100
        total_pages:
          type: integer
          example: 10
      required:
        - page
        - limit
        - total
        - total_pages

    PaginatedBooksResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Book"
        metadata:
          $ref: "#/components/schemas/PaginationMetadata"
      required:
        - data
        - metadata

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    UnauthorizedError:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

security:
  - BearerAuth: []
