openapi: 3.0.0
info:
  title: Library API
  version: 0.0.0
tags: []
paths:
  /books:
    get:
      operationId: Books_list
      description: Get all books
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
  /books/{id}:
    get:
      operationId: Books_get
      description: Get book by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    Book:
      type: object
      required:
        - id
        - title
        - author
        - year
      properties:
        id:
          type: integer
          format: int32
          readOnly: true
        title:
          type: string
        author:
          type: string
        year:
          type: integer
          format: int32
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
servers:
  - url: http://localhost:4001
    description: Local development server
    variables: {}
