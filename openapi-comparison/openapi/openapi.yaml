openapi: 3.0.0
info:
  title: Library API
  version: 1.0.0

servers:
  - url: http://localhost:4001
    description: Local development server

paths:
  /books:
    get:
      summary: Get all books
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'

  /books/{id}:
    get:
      summary: Get book by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Doraemon
        author:
          type: string
          example: Fujiko Fujio
        year:
          type: integer
          example: 1969
    Error:
      type: object
      properties:
        error:
          type: string
          example: Book not found
